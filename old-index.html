<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EONET // Earth Events</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet" />
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --panel-bg: rgba(10, 12, 22, 0.62);
      --panel-border: rgba(255, 255, 255, 0.14);
      --text: #e8edf7;
      --muted: #99a6bd;
      --accent: #5fd7ff;
      --shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      --ease: 300ms ease;
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", sans-serif;
      overflow: hidden;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
      background: radial-gradient(circle at 20% 10%, rgba(62, 96, 170, 0.16), rgba(10, 10, 15, 0.92) 55%);
    }

    #map {
      width: 100%;
      height: 100%;
      filter: saturate(1.05) contrast(1.06);
    }

    .glass {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transition: all var(--ease);
    }

    .header {
      position: fixed;
      top: 14px;
      left: 16px;
      right: 16px;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      pointer-events: auto;
    }

    .title-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .title {
      margin: 0;
      font-family: "Orbitron", sans-serif;
      letter-spacing: 0.08em;
      font-size: clamp(0.95rem, 1.5vw, 1.15rem);
      color: #ebf3ff;
      text-transform: uppercase;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 0.84rem;
      color: #d7f7ff;
      border-radius: 999px;
      padding: 7px 12px;
      border: 1px solid rgba(95, 215, 255, 0.45);
      background: rgba(14, 28, 42, 0.8);
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #28ffd1;
      box-shadow: 0 0 10px #28ffd1;
      animation: liveDotPulse 1.7s infinite ease-out;
    }

    @keyframes liveDotPulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.35); opacity: 1; }
    }

    .legend {
      position: fixed;
      left: 16px;
      bottom: 16px;
      z-index: 14;
      width: min(280px, calc(100vw - 32px));
      padding: 10px 12px;
    }

    .legend-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .legend-title {
      margin: 0;
      font-family: "Orbitron", sans-serif;
      font-size: 0.76rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #dfe9ff;
    }

    .legend-toggle {
      display: none;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(5, 7, 16, 0.75);
      color: #dbe7ff;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.72rem;
      cursor: pointer;
      transition: all var(--ease);
    }

    .legend-toggle:hover {
      border-color: rgba(95, 215, 255, 0.55);
      color: #e8f8ff;
    }

    .legend-items {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 10px;
      padding: 0;
      margin: 0;
      list-style: none;
      max-height: 38vh;
      overflow: auto;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #cfd8ea;
      font-size: 0.77rem;
    }

    .legend-color {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 8px var(--legend-color);
      background: var(--legend-color);
    }

    .timeline-controls {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      z-index: 16;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      min-width: min(560px, calc(100vw - 32px));
      max-width: calc(100vw - 32px);
    }

    .control-btn,
    .control-select {
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(8, 14, 24, 0.86);
      color: #e8eefc;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      transition: all var(--ease);
    }

    .control-btn {
      cursor: pointer;
      min-width: 84px;
    }

    .control-btn:hover,
    .control-select:hover {
      border-color: rgba(95, 215, 255, 0.58);
    }

    .date-counter {
      font-family: "Orbitron", sans-serif;
      letter-spacing: 0.06em;
      color: #d0e9ff;
      font-size: 0.78rem;
      margin-left: auto;
      white-space: nowrap;
    }

    .detail-panel {
      position: fixed;
      top: 78px;
      right: 16px;
      width: min(420px, calc(100vw - 32px));
      height: calc(100vh - 94px);
      z-index: 22;
      transform: translateX(120%);
      opacity: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .detail-panel.open {
      transform: translateX(0);
      opacity: 1;
      pointer-events: auto;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.09);
    }

    .panel-title {
      margin: 0;
      font-family: "Orbitron", sans-serif;
      font-size: 0.86rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #d9e7ff;
    }

    .close-panel {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(18, 24, 36, 0.8);
      color: #eff4ff;
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      transition: all var(--ease);
    }

    .close-panel:hover {
      border-color: rgba(95, 215, 255, 0.65);
      transform: rotate(90deg);
    }

    .panel-content {
      overflow: auto;
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .event-name {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 700;
      color: #f1f7ff;
      line-height: 1.3;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .meta-card {
      background: rgba(15, 22, 35, 0.68);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 10px;
    }

    .meta-label {
      color: #96a9c7;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .meta-value {
      color: #eaf2ff;
      font-weight: 600;
      font-size: 0.88rem;
      word-break: break-word;
    }

    .source-list,
    .geometry-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 8px;
    }

    .source-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #77d8ff;
      text-decoration: none;
      font-size: 0.84rem;
      transition: color var(--ease);
    }

    .source-link:hover {
      color: #b8ecff;
    }

    .geometry-item {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 8px 10px;
      background: rgba(13, 19, 31, 0.58);
      color: #cfe1ff;
      font-size: 0.8rem;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .geometry-date {
      color: #8fa6ca;
      white-space: nowrap;
    }

    .maplibregl-ctrl-bottom-right,
    .maplibregl-ctrl-bottom-left {
      bottom: 82px;
    }

    .marker-wrapper {
      width: 14px;
      height: 14px;
      position: relative;
      cursor: pointer;
      transition: opacity var(--ease);
    }

    .marker-wrapper.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .marker-wrapper.hidden .marker {
      transform: scale(0.45);
    }

    .marker {
      --marker-color: #aaaaaa;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--marker-color);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 0 12px var(--marker-color), 0 0 24px color-mix(in srgb, var(--marker-color) 70%, #fff 30%);
      transition: transform var(--ease), filter var(--ease);
      position: absolute;
      top: 0;
      left: 0;
    }

    .marker::after {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 1px solid color-mix(in srgb, var(--marker-color) 72%, white 28%);
      opacity: 0.55;
    }

    .marker-wrapper:hover .marker {
      transform: scale(1.22);
      filter: brightness(1.15);
    }

    .marker-wrapper .marker.live::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--marker-color);
      z-index: -1;
      animation: hardwarePulse 2s infinite ease-out;
    }

    @keyframes hardwarePulse {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(2.8); opacity: 0; }
    }

    .toast {
      position: fixed;
      left: 50%;
      top: 76px;
      transform: translate(-50%, -16px);
      z-index: 30;
      border-radius: 999px;
      padding: 10px 14px;
      border: 1px solid rgba(255, 90, 90, 0.45);
      background: rgba(50, 6, 12, 0.88);
      color: #ffd5dd;
      font-size: 0.84rem;
      opacity: 0;
      pointer-events: none;
      transition: all var(--ease);
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 960px) {
      .timeline-controls {
        min-width: auto;
        width: calc(100vw - 32px);
      }

      .meta-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .header {
        top: 10px;
        left: 10px;
        right: 10px;
        padding: 10px 12px;
      }

      .legend {
        left: 10px;
        bottom: 112px;
        width: min(260px, calc(100vw - 20px));
      }

      .legend-toggle {
        display: inline-flex;
      }

      .legend-items {
        display: none;
        margin-top: 4px;
      }

      .legend.expanded .legend-items {
        display: grid;
      }

      .timeline-controls {
        left: 10px;
        right: 10px;
        transform: none;
        width: auto;
        bottom: 10px;
        gap: 8px;
      }

      .date-counter {
        font-size: 0.72rem;
      }

      .detail-panel {
        left: 10px;
        right: 10px;
        top: auto;
        bottom: 10px;
        width: auto;
        height: min(64vh, 520px);
        transform: translateY(110%);
      }

      .detail-panel.open {
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="map" aria-label="NASA EONET natural disaster map"></div>

    <header class="header glass" role="banner">
      <div class="title-wrap">
        <h1 class="title">EONET // Earth Events</h1>
        <span class="subtitle">NASA Near Real-Time Natural Hazard Tracker</span>
      </div>
      <div id="liveBadge" class="live-badge" aria-live="polite">
        <span class="live-dot" aria-hidden="true"></span>
        <span><strong id="liveCount">0</strong> live events</span>
      </div>
    </header>

    <aside id="legend" class="legend glass" aria-label="Event category legend">
      <div class="legend-head">
        <h2 class="legend-title">Category Legend</h2>
        <button id="legendToggle" class="legend-toggle" type="button">Show</button>
      </div>
      <ul id="legendItems" class="legend-items"></ul>
    </aside>

    <section id="timelineControls" class="timeline-controls glass" aria-label="Timeline animation controls">
      <button id="playPauseBtn" class="control-btn" type="button">Play</button>
      <select id="speedSelect" class="control-select" aria-label="Timeline speed">
        <option value="slow">Slow</option>
        <option value="normal" selected>Normal</option>
        <option value="fast">Fast</option>
      </select>
      <div id="dateCounter" class="date-counter">Timeline idle</div>
    </section>

    <aside id="detailPanel" class="detail-panel glass" aria-hidden="true">
      <div class="panel-head">
        <h2 class="panel-title">Event Details</h2>
        <button id="closePanelBtn" class="close-panel" aria-label="Close event details">×</button>
      </div>
      <div id="panelContent" class="panel-content">
        <p class="meta-value">Click any event marker to inspect details.</p>
      </div>
    </aside>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </div>

  <script>
    // ----- Constants and category mappings -----
    const EONET_URL = "https://eonet.gsfc.nasa.gov/api/v3/events?status=all&days=365&limit=500";

    const CATEGORY_COLORS = {
      wildfires: "#FF4500",
      volcanoes: "#FF6B35",
      severeStorms: "#00BFFF",
      earthquakes: "#FFD700",
      floods: "#1E90FF",
      drought: "#DAA520",
      dustHaze: "#C8A96E",
      landslides: "#8B4513",
      snow: "#E0FFFF",
      seaLakeIce: "#87CEEB",
      tempExtremes: "#FF1493"
    };

    const CATEGORY_LABELS = {
      wildfires: "Wildfires",
      volcanoes: "Volcanoes",
      severeStorms: "Severe Storms",
      earthquakes: "Earthquakes",
      floods: "Floods",
      drought: "Drought",
      dustHaze: "Dust & Haze",
      landslides: "Landslides",
      snow: "Snow",
      seaLakeIce: "Sea / Lake Ice",
      tempExtremes: "Temperature Extremes"
    };

    const SPEEDS = {
      slow: 900,
      normal: 450,
      fast: 180
    };

    // ----- Runtime state -----
    let map;
    let allEvents = [];
    let timelineEvents = [];
    let markerRecords = [];
    const markerById = new Map();

    const timelineState = {
      isPlaying: false,
      currentIndex: 0,
      intervalId: null,
      isResetForPlayback: false
    };

    // ----- DOM references -----
    const liveCountEl = document.getElementById("liveCount");
    const legendEl = document.getElementById("legend");
    const legendItemsEl = document.getElementById("legendItems");
    const legendToggleBtn = document.getElementById("legendToggle");
    const detailPanelEl = document.getElementById("detailPanel");
    const panelContentEl = document.getElementById("panelContent");
    const closePanelBtn = document.getElementById("closePanelBtn");
    const toastEl = document.getElementById("toast");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const speedSelect = document.getElementById("speedSelect");
    const dateCounterEl = document.getElementById("dateCounter");

    init();

    // ----- App bootstrap -----
    function init() {
      renderLegend();
      bindGlobalUI();
      initMap();
    }

    function initMap() {
      const style = {
        version: 8,
        sources: {
          esriImagery: {
            type: "raster",
            tiles: ["https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"],
            tileSize: 256,
            attribution: "Esri, Maxar, Earthstar Geographics"
          },
          topoContours: {
            type: "raster",
            tiles: ["https://tile.opentopomap.org/{z}/{x}/{y}.png"],
            tileSize: 256,
            attribution: "OpenTopoMap contributors"
          }
        },
        layers: [
          {
            id: "space-bg",
            type: "background",
            paint: {
              "background-color": "#05060d"
            }
          },
          {
            id: "imagery",
            type: "raster",
            source: "esriImagery",
            paint: {
              "raster-brightness-max": 0.72,
              "raster-contrast": 0.24,
              "raster-saturation": -0.22
            }
          },
          {
            id: "contours",
            type: "raster",
            source: "topoContours",
            paint: {
              "raster-opacity": 0.16,
              "raster-contrast": 0.35,
              "raster-saturation": -0.6,
              "raster-brightness-max": 0.65
            }
          },
          {
            id: "night-filter",
            type: "background",
            paint: {
              "background-color": "#03040b",
              "background-opacity": 0.28
            }
          }
        ]
      };

      map = new maplibregl.Map({
        container: "map",
        style,
        center: [0, 16],
        zoom: 1.7,
        minZoom: 1,
        maxZoom: 8,
        attributionControl: true,
        antialias: true
      });

      map.addControl(new maplibregl.NavigationControl({ showCompass: true }), "bottom-right");

      map.on("load", () => {
        loadEventsWithRetry(0);
      });
    }

    function bindGlobalUI() {
      closePanelBtn.addEventListener("click", closeDetailPanel);

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closeDetailPanel();
        }
      });

      legendToggleBtn.addEventListener("click", () => {
        const expanded = legendEl.classList.toggle("expanded");
        legendToggleBtn.textContent = expanded ? "Hide" : "Show";
      });

      playPauseBtn.addEventListener("click", () => {
        if (!timelineEvents.length) {
          return;
        }

        if (timelineState.isPlaying) {
          pauseTimeline();
        } else {
          playTimeline();
        }
      });

      speedSelect.addEventListener("change", () => {
        if (timelineState.isPlaying) {
          restartTimelineTicker();
        }
      });
    }

    // ----- Data fetching and normalization -----
    async function loadEventsWithRetry(attempt) {
      try {
        const response = await fetch(EONET_URL, { cache: "no-store" });
        if (!response.ok) {
          throw new Error("EONET request failed with status " + response.status);
        }

        const payload = await response.json();
        const rawEvents = Array.isArray(payload.events) ? payload.events : [];

        allEvents = rawEvents
          .map(normalizeEvent)
          .filter((event) => event && Number.isFinite(event.lng) && Number.isFinite(event.lat));

        timelineEvents = [...allEvents].sort((a, b) => a.startTime - b.startTime);

        updateLiveBadge(allEvents);
        clearExistingMarkers();
        plotEvents(allEvents);

        timelineState.isResetForPlayback = false;
        timelineState.currentIndex = 0;
        dateCounterEl.textContent = allEvents.length ? "Ready to animate" : "No events found";
      } catch (error) {
        console.error(error);
        showToast("Failed to load events. Retrying...");

        if (attempt < 1) {
          window.setTimeout(() => {
            loadEventsWithRetry(attempt + 1);
          }, 3000);
        }
      }
    }

    function normalizeEvent(event) {
      if (!event || !Array.isArray(event.geometry) || event.geometry.length === 0) {
        return null;
      }

      const geometries = event.geometry
        .map((g) => {
          const coord = extractCoordinate(g);
          const parsedDate = new Date(g.date);
          if (!coord) {
            return null;
          }
          if (Number.isNaN(parsedDate.getTime())) {
            return null;
          }
          return {
            date: parsedDate,
            type: g.type || "Unknown",
            coordinates: coord
          };
        })
        .filter(Boolean)
        .sort((a, b) => a.date - b.date);

      if (!geometries.length) {
        return null;
      }

      const category = Array.isArray(event.categories) && event.categories[0] ? event.categories[0] : {};
      const categoryId = category.id || "unknown";
      const closedDate = event.closed ? new Date(event.closed) : null;
      const status = closedDate ? "closed" : "open";

      return {
        id: event.id || crypto.randomUUID(),
        title: event.title || "Untitled event",
        categoryId,
        categoryTitle: category.title || CATEGORY_LABELS[categoryId] || "Other",
        color: CATEGORY_COLORS[categoryId] || "#AAAAAA",
        status,
        closedDate,
        sources: Array.isArray(event.sources) ? event.sources : [],
        geometries,
        startTime: geometries[0].date,
        endTime: geometries[geometries.length - 1].date,
        lng: geometries[geometries.length - 1].coordinates[0],
        lat: geometries[geometries.length - 1].coordinates[1]
      };
    }

    function extractCoordinate(geometry) {
      if (!geometry || !geometry.coordinates) {
        return null;
      }

      const { type, coordinates } = geometry;

      if (type === "Point" && Array.isArray(coordinates) && coordinates.length >= 2) {
        return [Number(coordinates[0]), Number(coordinates[1])];
      }

      if (type === "LineString" && Array.isArray(coordinates[0])) {
        return [Number(coordinates[0][0]), Number(coordinates[0][1])];
      }

      if (type === "Polygon" && Array.isArray(coordinates[0]) && Array.isArray(coordinates[0][0])) {
        return [Number(coordinates[0][0][0]), Number(coordinates[0][0][1])];
      }

      if (type === "MultiPoint" && Array.isArray(coordinates[0])) {
        return [Number(coordinates[0][0]), Number(coordinates[0][1])];
      }

      if (type === "MultiLineString" && Array.isArray(coordinates[0]) && Array.isArray(coordinates[0][0])) {
        return [Number(coordinates[0][0][0]), Number(coordinates[0][0][1])];
      }

      if (type === "MultiPolygon" && Array.isArray(coordinates[0]) && Array.isArray(coordinates[0][0]) && Array.isArray(coordinates[0][0][0])) {
        return [Number(coordinates[0][0][0][0]), Number(coordinates[0][0][0][1])];
      }

      return null;
    }

    // ----- Marker rendering -----
    function clearExistingMarkers() {
      markerRecords.forEach((record) => record.marker.remove());
      markerRecords = [];
      markerById.clear();
    }

    function plotEvents(events) {
      events.forEach((event) => {
        const wrapperEl = document.createElement("div");
        wrapperEl.className = "marker-wrapper";

        const markerEl = document.createElement("div");
        markerEl.className = "marker" + (event.status === "open" ? " live" : "");
        markerEl.style.setProperty("--marker-color", event.color);

        wrapperEl.appendChild(markerEl);

        const marker = new maplibregl.Marker({
          element: wrapperEl,
          anchor: "center"
        })
          .setLngLat([event.lng, event.lat])
          .addTo(map);

        wrapperEl.addEventListener("click", () => {
          openDetailPanel(event);
        });

        const record = { event, marker, element: wrapperEl, innerElement: markerEl };
        markerRecords.push(record);
        markerById.set(event.id, record);
      });
    }

    function updateLiveBadge(events) {
      const liveCount = events.reduce((count, event) => count + (event.status === "open" ? 1 : 0), 0);
      liveCountEl.textContent = String(liveCount);
    }

    // ----- Event detail side panel -----
    function openDetailPanel(event) {
      const geometryItems = event.geometries
        .map((g) => {
          const [lng, lat] = g.coordinates;
          return `
            <li class="geometry-item">
              <span>${formatDateTime(g.date)} · ${lat.toFixed(2)}, ${lng.toFixed(2)}</span>
              <span class="geometry-date">${g.type}</span>
            </li>
          `;
        })
        .join("");

      const sourceItems = event.sources.length
        ? event.sources
            .map((source) => {
              const sourceName = source.id || "Source";
              const url = source.url || "#";
              return `<li><a class="source-link" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(sourceName)} ↗</a></li>`;
            })
            .join("")
        : "<li class=\"meta-value\">No source links available.</li>";

      panelContentEl.innerHTML = `
        <h3 class="event-name">${escapeHtml(event.title)}</h3>

        <div class="meta-grid">
          <div class="meta-card">
            <div class="meta-label">Category</div>
            <div class="meta-value">${escapeHtml(event.categoryTitle)}</div>
          </div>
          <div class="meta-card">
            <div class="meta-label">Status</div>
            <div class="meta-value">${event.status === "open" ? "Open / Live" : "Closed / Historical"}</div>
          </div>
          <div class="meta-card">
            <div class="meta-label">Start</div>
            <div class="meta-value">${formatDateTime(event.startTime)}</div>
          </div>
          <div class="meta-card">
            <div class="meta-label">End</div>
            <div class="meta-value">${event.closedDate ? formatDateTime(event.closedDate) : formatDateTime(event.endTime)}</div>
          </div>
        </div>

        <section>
          <div class="meta-label" style="margin-bottom: 8px;">Source Links</div>
          <ul class="source-list">${sourceItems}</ul>
        </section>

        <section>
          <div class="meta-label" style="margin-bottom: 8px;">Geometry Timeline (${event.geometries.length})</div>
          <ul class="geometry-list">${geometryItems}</ul>
        </section>
      `;

      detailPanelEl.classList.add("open");
      detailPanelEl.setAttribute("aria-hidden", "false");

      map.flyTo({ center: [event.lng, event.lat], zoom: Math.max(map.getZoom(), 3.5), duration: 900 });
    }

    function closeDetailPanel() {
      detailPanelEl.classList.remove("open");
      detailPanelEl.setAttribute("aria-hidden", "true");
    }

    // ----- Timeline controls -----
    function playTimeline() {
      if (!timelineEvents.length) {
        return;
      }

      // Allow replay after reaching the end.
      if (timelineState.currentIndex >= timelineEvents.length) {
        timelineState.isResetForPlayback = false;
      }

      if (!timelineState.isResetForPlayback) {
        markerRecords.forEach((record) => record.element.classList.add("hidden"));
        timelineState.currentIndex = 0;
        timelineState.isResetForPlayback = true;
      }

      timelineState.isPlaying = true;
      playPauseBtn.textContent = "Pause";
      restartTimelineTicker();
    }

    function pauseTimeline() {
      timelineState.isPlaying = false;
      playPauseBtn.textContent = "Play";
      if (timelineState.intervalId) {
        clearInterval(timelineState.intervalId);
        timelineState.intervalId = null;
      }
    }

    function restartTimelineTicker() {
      if (timelineState.intervalId) {
        clearInterval(timelineState.intervalId);
      }

      const speedKey = speedSelect.value in SPEEDS ? speedSelect.value : "normal";
      const intervalMs = SPEEDS[speedKey];

      timelineState.intervalId = setInterval(stepTimeline, intervalMs);
    }

    function stepTimeline() {
      const event = timelineEvents[timelineState.currentIndex];

      if (!event) {
        pauseTimeline();
        dateCounterEl.textContent = "Timeline complete";
        return;
      }

      const markerRecord = markerById.get(event.id);
      if (markerRecord) {
        markerRecord.element.classList.remove("hidden");
      }

      dateCounterEl.textContent = formatDate(event.startTime);
      timelineState.currentIndex += 1;
    }

    // ----- Utility rendering helpers -----
    function renderLegend() {
      const orderedKeys = Object.keys(CATEGORY_LABELS);
      const items = orderedKeys
        .map((key) => {
          const color = CATEGORY_COLORS[key] || "#AAAAAA";
          const label = CATEGORY_LABELS[key];
          return `
            <li class="legend-item">
              <span class="legend-color" style="--legend-color:${color}"></span>
              <span>${label}</span>
            </li>
          `;
        })
        .join("");

      legendItemsEl.innerHTML =
        items +
        `
        <li class="legend-item">
          <span class="legend-color" style="--legend-color:#AAAAAA"></span>
          <span>Other</span>
        </li>
      `;
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("show");
      window.clearTimeout(showToast._timeout);
      showToast._timeout = window.setTimeout(() => {
        toastEl.classList.remove("show");
      }, 3200);
    }

    function formatDate(date) {
      return new Intl.DateTimeFormat(undefined, {
        year: "numeric",
        month: "short",
        day: "2-digit"
      }).format(date);
    }

    function formatDateTime(date) {
      return new Intl.DateTimeFormat(undefined, {
        year: "numeric",
        month: "short",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
